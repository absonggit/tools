<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成 config.yaml 文件</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 10px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #yamlOutput {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
            white-space: pre; /* 允许格式化 */
        }
    </style>
</head>
<body>
    <h1>生成 config.yaml 文件</h1>
    <form id="configForm">
        <label for="nodeName">节点名称：</label>
        <input type="text" id="nodeName" name="nodeName" required>

        <label for="nodeIP">节点 IP：</label>
        <input type="text" id="nodeIP" name="nodeIP" required>

        <label for="server">服务器地址：</label>
        <input type="text" id="server" name="server" required>

        <label for="token">Token：</label>
        <input type="text" id="token" name="token" required>

        <label for="otherConfig">其他配置：</label>
        <textarea id="otherConfig" name="otherConfig" rows="5" placeholder="请填写其他配置以 YAML 格式..."></textarea>

        <button type="submit">生成 Config</button>
    </form>

    <h2>生成的 config.yaml 内容：</h2>
    <div id="yamlOutput"></div>
    <button id="copyButton" style="display:none;">复制到剪贴板</button>

    <script>
        document.getElementById('configForm').addEventListener('submit', function(event) {
            event.preventDefault(); // 阻止表单默认提交

            // 获取表单数据
            const nodeName = document.getElementById('nodeName').value;
            const nodeIP = document.getElementById('nodeIP').value;
            const server = document.getElementById('server').value;
            const token = document.getElementById('token').value;
            const otherConfig = document.getElementById('otherConfig').value;

            // 生成 YAML 内容
            const yamlContent = `
# 自动生成的 config.yaml 文件
node-name: ${nodeName}
node-ip: ${nodeIP}
server: ${server}
token: ${token}
${otherConfig}
            `.trim();

            // 显示生成的 YAML 内容
            const yamlOutput = document.getElementById('yamlOutput');
            yamlOutput.textContent = yamlContent; // 使用 textContent 以保持格式

            // 显示复制按钮
            const copyButton = document.getElementById('copyButton');
            copyButton.style.display = 'inline-block';
            copyButton.onclick = function() {
                // 复制内容到剪贴板
                navigator.clipboard.writeText(yamlContent).then(function() {
                    alert('已复制到剪贴板！');
                }, function(err) {
                    alert('复制失败!', err);
                });
            };
        });
    </script>
</body>
</html>
